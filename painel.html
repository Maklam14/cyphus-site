<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel - Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="account-page">
  <main class="account-wrapper">
    <section class="account-box">
      <div class="account-topbar">
        <div>
          <p class="account-eyebrow">Minha conta</p>
          <h1 class="account-title">Painel do cliente</h1>
          <p class="account-subtitle">
            Acompanhe seu acesso e gerencie sua conta na Cyphus.
          </p>
        </div>
        <button id="logout" class="auth-btn auth-btn-secondary logout-btn">Sair</button>
      </div>

      <div class="account-grid">
        <article class="account-card">
          <h2 class="account-card-title">Seus dados</h2>
          <p class="account-line"><strong>Nome:</strong> <span id="user-name"></span></p>
          <p class="account-line"><strong>E-mail:</strong> <span id="user-email"></span></p>
          <p class="account-line"><strong>ID:</strong> <span id="user-id"></span></p>
          <p class="account-line"><strong>Endereço:</strong> <span id="user-address"></span></p>
        </article>

        <article class="account-card">
          <h2 class="account-card-title">Ações rápidas</h2>
          <div class="account-actions">
            <a href="perfil.html" class="auth-btn auth-btn-primary auth-btn-link">Editar perfil</a>
            <a href="shop-all.html" class="auth-btn auth-btn-secondary auth-btn-link">Continuar comprando</a>
          </div>
        </article>
      </div>

      <section class="orders-section">
        <div class="orders-header">
          <h2 class="account-card-title">Meus pedidos</h2>
          <p class="orders-subtitle">Acompanhe aqui suas compras mais recentes.</p>
        </div>

        <div id="orders-list" class="orders-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/painel.js"></script>
</body>
</html>
