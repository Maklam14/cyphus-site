<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Cyphus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

      <header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">CYPHUS</a>

    <form class="header-search" action="#" method="get">
      <input type="text" name="q" placeholder="Buscar" aria-label="Buscar produtos">
      <button type="submit" aria-label="Pesquisar">
        <!-- ícone da lupa -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
          <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </button>
    </form>

<nav class="main-nav">
  <a href="carrinho.html">
    Carrinho <span id="cart-count" class="cart-count"></span>
  </a>
  <a href="entrar.html">Entrar</a>
  <a href="precisa-ajuda.html" target="_blank">Precisa de ajuda?</a>
</nav>
  </div>
</header>

    <div class="auth-container">
        <h2 class="auth-title">Painel do Usuário</h2>

        <p id="user-email" class="user-info">Carregando...</p>

        <button id="logout" class="btn btn-dark auth-btn">Sair</button>
    </div>


    <!-- SCRIPT DO FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUYDq5MUsvDDF9AhlJcMYO89PFkI1el20",
            authDomain: "cyphus-50845.firebaseapp.com",
            projectId: "cyphus-50845",
            storageBucket: "cyphus-50845.firebasestorage.app",
            messagingSenderId: "453655824258",
            appId: "1:453655824258:web:11ce244f8ee89c3019719b",
            measurementId: "G-HCEP9HDFJL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // PROTEÇÃO DA PÁGINA
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("user-email").innerText =
                    "Logado como: " + user.email;
            } else {
                window.location.href = "entrar.html"; // se não estiver logado, volta pro login
            }
        });

        // LOGOUT
        document.getElementById("logout").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "entrar.html";
            });
        });
    </script>

</body>
</html>
