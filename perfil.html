<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="account-page">
  <main class="account-wrapper">
    <section class="account-box">
      <div class="account-topbar">
        <div>
          <p class="account-eyebrow">Minha conta</p>
          <h1 class="account-title">Meu perfil</h1>
          <p class="account-subtitle">
            Atualize seus dados para manter sua conta sempre em dia.
          </p>
        </div>
        <button id="logout" class="auth-btn auth-btn-secondary logout-btn">Sair</button>
      </div>

      <article class="account-card profile-card">
        <p class="account-line"><strong>E-mail:</strong> <span id="user-email"></span></p>

        <form id="form-perfil" class="auth-form profile-form">
          <div class="auth-field">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome" />
          </div>

          <div class="auth-field">
            <label for="endereco">Endereço de entrega (padrão)</label>
            <input
            type="text"
            id="endereco"
            placeholder="Ex: Rua Exemplo, 123 - Centro"
            maxlength="200"
          />
          </div>

          <div class="auth-field">
            <label for="avatar">URL da foto</label>
            <input type="url" id="avatar" placeholder="Cole a URL da sua foto" />
          </div>

          <p id="mensagem" class="auth-message"></p>

          <div class="account-actions">
            <button type="submit" class="auth-btn auth-btn-primary">Salvar alterações</button>
            <a href="painel.html" class="auth-btn auth-btn-secondary auth-btn-link">Voltar ao painel</a>
          </div>
        </form>
      </article>
    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/perfil.js"></script>
</body>
</html>
