<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova senha - Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-box">
      <div class="auth-logo">Cyphus</div>

      <h1 class="auth-title">Criar nova senha</h1>
      <p class="auth-subtitle">
        Defina uma nova senha para acessar sua conta.
      </p>

      <form id="form-nova-senha" class="auth-form">
        <div class="auth-field">
          <label for="senha">Nova senha</label>
          <input
            type="password"
            id="senha"
            placeholder="Digite sua nova senha"
            required
            minlength="6"
          />
        </div>

        <div class="auth-field">
          <label for="confirmar-senha">Confirmar nova senha</label>
          <input
            type="password"
            id="confirmar-senha"
            placeholder="Confirme sua nova senha"
            required
            minlength="6"
          />
        </div>

        <p id="mensagem" class="auth-message"></p>

        <div class="auth-actions">
          <button type="submit" class="auth-btn auth-btn-primary">
            Atualizar senha
          </button>

          <a href="entrar.html" class="auth-btn auth-btn-secondary auth-btn-link">
            Voltar para entrar
          </a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="./js/nova-senha.js"></script>
</body>
</html>
