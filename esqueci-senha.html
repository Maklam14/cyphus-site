<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha - Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-box">
      <div class="auth-logo">Cyphus</div>

      <h1 class="auth-title">Recuperar senha</h1>
      <p class="auth-subtitle">
        Digite seu e-mail para receber um link de redefinição de senha.
      </p>

      <form id="form-esqueci-senha" class="auth-form">
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            required
          />
        </div>

        <p id="mensagem" class="auth-message"></p>

        <div class="auth-actions">
          <button type="submit" class="auth-btn auth-btn-primary">
            Enviar link
          </button>

          <a href="entrar.html" class="auth-btn auth-btn-secondary auth-btn-link">
            Voltar para entrar
          </a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="./js/esqueci-senha.js"></script>
</body>
</html>
