
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="header.css">
</head>
<body>


<!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">CYPHUS</a>


      <form class="header-search" action="#" method="get">
        <input type="text" name="q" placeholder="Buscar" aria-label="Buscar produtos">
        <button type="submit" aria-label="Pesquisar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
            <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
      </form>


          <nav class="main-nav">
        <a href="carrinho.html">
          Carrinho <span id="cart-count" class="cart-count"></span>
        </a>
        <a id="login-link" href="entrar.html">Entrar</a>
        <a id="painel-link" href="painel.html" style="display:none;">Painel</a>
        <a href="precisa-ajuda.html" target="_blank">Precisa de ajuda?</a>
      </nav>
    </div>
  </header>


<section class="checkout-section">
  <div class="checkout-container">


    <div class="checkout-left">


  <!-- DADOS PESSOAIS -->
  <div class="checkout-block" id="step-pessoal">
    <h2 class="block-title">Dados pessoais</h2>


    <div class="form-group">
      <label>Nome completo *</label>
      <input type="text" id="nome-completo" placeholder="Seu nome" required>
    </div>


    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email-checkout" placeholder="seuemail@exemplo.com" required>
    </div>


    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000">
    </div>


    <button class="btn-next" id="btn-to-entrega">Ir para entrega</button>
  </div>


  <!-- ENTREGA -->
  <div class="checkout-block hidden" id="step-entrega">
    <h2 class="block-title">Entrega</h2>


    <div class="form-group">
      <label>CEP *</label>
      <input type="text" id="cep" placeholder="00000-000" required>
    </div>


    <div class="form-group">
      <label>Rua *</label>
      <input type="text" id="rua" placeholder="Nome da rua" required>
    </div>


    <div class="form-row">
      <div class="form-group">
        <label>Número *</label>
        <input type="text" id="numero" placeholder="123" required>
      </div>


      <div class="form-group">
        <label>Complemento</label>
        <input type="text" id="complemento" placeholder="Opcional">
      </div>
    </div>


    <div class="form-row">
      <div class="form-group">
        <label>Bairro *</label>
        <input type="text" id="bairro" placeholder="Bairro" required>
      </div>


      <div class="form-group">
        <label>Cidade *</label>
        <input type="text" id="cidade" placeholder="Cidade" required>
      </div>
    </div>


    <div class="form-group">
      <label>Estado *</label>
      <input type="text" id="estado" placeholder="UF" required>
    </div>


    <button class="btn-next" id="btn-to-pagamento">Ir para pagamento</button>
  </div>


  <!-- PAGAMENTO -->
  <div class="checkout-block hidden" id="step-pagamento">
    <h2 class="block-title">Pagamento</h2>


    <div class="payment-methods">
      <button class="payment-option active" data-method="mp">Mercado Pago</button>
    </div>


    <div class="payment-info">
      <p>Pagamento seguro via Mercado Pago</p>
      <div class="payment-logos">
      </div>
    </div>


    <button class="btn-finalizar-pedido" id="btn-finalizar">Finalizar pedido</button>
  </div>


</div>


    <div class="checkout-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">R$ 0,00</span>
      </div>

      <div class="summary-row">
        <span>Frete</span>
        <span id="summary-frete">R$ 0,00</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span id="summary-total">R$ 0,00</span>
      </div>

      <a href="carrinho.html" class="back-cart">← Voltar para o carrinho</a>
    </div>
  </div>
</section>


<script type="module" src="checkout.js"></script>
<script type="module" src="./js/auth.js"></script>


</body>
</html>
