<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar - Cyphus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <meta name="p:domain_verify" content="a16aac60d0c82f5cbe061fab57cce90b"/>
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-box">
      <div class="auth-logo">Cyphus</div>

      <h1 class="auth-title">Acesse sua conta</h1>
      <p class="auth-subtitle">
        Entre para acompanhar seus pedidos, editar seu perfil e acessar sua área do cliente.
      </p>

      <form id="form-login" class="auth-form">
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            required
          />
        </div>

        <div class="auth-field">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required
          />
        </div>

        <a href="esqueci-senha.html" class="auth-link">Esqueceu a senha?</a>

        <p id="mensagem" class="auth-message"></p>

        <div class="auth-actions">
          <button type="submit" class="auth-btn auth-btn-primary">Entrar</button>

          <a href="criar-conta.html" class="auth-btn auth-btn-secondary auth-btn-link">
            Quero criar minha conta
          </a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
